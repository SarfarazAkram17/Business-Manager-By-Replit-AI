kind = "web"
previewPath = "/"
title = "Business Manager"
version = "1.0.0"
id = "artifacts/business-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21795

[services.development]
run = "pnpm --filter @workspace/business-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/business-manager", "run", "build" ]
publicDir = "artifacts/business-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21795"
BASE_PATH = "/"
